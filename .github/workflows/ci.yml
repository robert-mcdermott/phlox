name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check app tests
      - name: Tests (pytest + coverage)
        run: uv run pytest --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  container-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t phlox-ci .
      - name: Assert non-root runtime identity and writable data path
        run: |
          test "$(docker image inspect phlox-ci --format '{{.Config.User}}')" = "10001:10001"
          docker run --rm --entrypoint sh phlox-ci -c 'test "$(id -u)" = 10001 && test "$(id -g)" = 10001 && test -w /app/backend/data && test ! -w /app/backend/app'
