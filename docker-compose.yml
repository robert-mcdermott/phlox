# Phlox — single-container deployment.
#
#   docker compose up -d --build      # build + run   (or: podman compose up -d --build)
#   docker compose logs -f phlox      # follow logs
#   docker compose down               # stop (data/ and config/ persist on host)
#
# Works with Docker or Podman (`podman compose`, or `podman-compose` on older Podman).
# On rootless Podman + SELinux, add `:Z` to the volume mounts below (e.g. ./data:/data:Z).
#
# Persistent state lives on the host under ./data and ./config — NOT in the image.
# See docs/DOCKER.md for the full guide (local LLM endpoints, Qdrant/Postgres, etc).

services:
  phlox:
    build:
      context: .
      dockerfile: Dockerfile
    image: phlox:latest
    container_name: phlox
    ports:
      - "8000:8000"          # host:container — browse http://localhost:8000
    volumes:
      # The container uses the project's OWN config + data — the same files you'd edit
      # for a direct host run. No separate/duplicate config. Create backend/config.yml
      # first:  cp backend/config.yml.example backend/config.yml
      - ./backend/config.yml:/app/backend/config.yml   # the one and only config file
      - ./backend/data:/app/backend/data               # SQLite DB (unless DATABASE_URL is set), embedded Qdrant, workspaces, uploads, attachments
    environment:
      # Generate once and keep it stable:  openssl rand -hex 32
      PHLOX_JWT_SECRET: ${PHLOX_JWT_SECRET:-please-change-me-set-a-real-32B+-secret}
      # Unset (default) = SQLite under ./backend/data. Set to deploy against Postgres instead,
      # e.g. postgresql+psycopg://phlox:phlox@postgres:5432/phlox — see the `postgres`
      # service below (enable with --profile with-postgres).
      DATABASE_URL: ${DATABASE_URL:-}
    # Lets the container reach services on the HOST's localhost (Ollama, LM Studio,
    # a host Postgres, etc.) via the hostname `host.docker.internal`.
    # Required on Linux; harmless/automatic on Docker Desktop (Mac/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Optional: run Qdrant as a server instead of embedded ───────────────────
  # Enable with:  docker compose --profile with-qdrant up -d --build
  # Then in config.yml set:   vector_store: { url: "http://qdrant:6333" }
  qdrant:
    image: qdrant/qdrant:latest
    container_name: phlox-qdrant
    profiles: ["with-qdrant"]
    volumes:
      - ./qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ── Optional: Postgres backend (instead of the default SQLite) ──────────────
  # Enable with:  docker compose --profile with-postgres up -d --build
  # Then set:     DATABASE_URL=postgresql+psycopg://phlox:phlox@postgres:5432/phlox
  postgres:
    image: postgres:16
    container_name: phlox-postgres
    profiles: ["with-postgres"]
    environment:
      POSTGRES_USER: phlox
      POSTGRES_PASSWORD: phlox
      POSTGRES_DB: phlox
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    restart: unless-stopped
